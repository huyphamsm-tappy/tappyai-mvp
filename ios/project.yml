# XcodeGen spec — generates TappyAI.xcodeproj.
# Run: xcodegen generate
name: TappyAI
options:
  bundleIdPrefix: com.tappyai
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "16.0"          # PROVISIONAL scaffold value — final min-iOS decided during Phase 0 (ADR-003). Not a lock.
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"                       # lower to "5.9" if tooling < Xcode 16
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO         # keep clean; flip to YES once verified on a Mac
    GCC_TREAT_WARNINGS_AS_ERRORS: NO
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""                        # set locally
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    TARGETED_DEVICE_FAMILY: "1,2"              # iPhone + iPad (responsive, per docs/ios/06)

configs:
  Debug: debug
  Release: release

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"

targets:
  TappyAI:
    type: application
    platform: iOS
    sources:
      - path: TappyAI
    dependencies:
      - package: Supabase
        product: Supabase
    configFiles:
      Debug: Config/Debug.xcconfig
      Release: Config/Release.xcconfig
    settings:
      base:
        PRODUCT_NAME: TappyAI
        INFOPLIST_FILE: TappyAI/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "0.1.0"
        CODE_SIGN_ENTITLEMENTS: TappyAI/TappyAI.entitlements
    scheme:
      testTargets:
        - TappyAITests
        - TappyAIUITests
      gatherCoverageData: true

  TappyAITests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: TappyAITests
    dependencies:
      - target: TappyAI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tappyai.ios.tests

  TappyAIUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: TappyAIUITests
    dependencies:
      - target: TappyAI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tappyai.ios.uitests
