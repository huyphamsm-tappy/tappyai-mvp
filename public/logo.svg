<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320">
  <defs>
    <!-- Main gradient: teal to orange -->
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1ABDD4;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4DB8D0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F5821F;stop-opacity:1" />
    </linearGradient>
    <!-- Orange gradient for right loop -->
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5A623;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F5821F;stop-opacity:1" />
    </linearGradient>
    <!-- Teal gradient for left loop -->
    <linearGradient id="grad3" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1ABDD4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D8FA8;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000022"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="320" fill="#FAF7F2"/>

  <!-- Infinity symbol - left loop (teal) -->
  <path d="M 160 120
    C 160 75, 110 65, 85 90
    C 60 115, 60 145, 85 165
    C 110 185, 150 175, 175 155
    C 190 143, 200 130, 200 130
    C 200 130, 190 117, 175 105
    C 165 97, 160 120, 160 120 Z"
    fill="url(#grad3)" filter="url(#shadow)" opacity="0.95"/>

  <!-- Infinity symbol - right loop (orange) -->
  <path d="M 240 120
    C 240 75, 290 65, 315 90
    C 340 115, 340 145, 315 165
    C 290 185, 250 175, 225 155
    C 210 143, 200 130, 200 130
    C 200 130, 210 117, 225 105
    C 235 97, 240 120, 240 120 Z"
    fill="url(#grad2)" filter="url(#shadow)" opacity="0.95"/>

  <!-- Sparkle star at top right of infinity -->
  <g transform="translate(298, 72)">
    <polygon points="0,-10 2,-3 9,-3 3,2 5,9 0,5 -5,9 -3,2 -9,-3 -2,-3"
      fill="#1ABDD4" transform="scale(1.3)"/>
  </g>

  <!-- TappyAI text -->
  <text x="200" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="42">
    <tspan fill="#1ABDD4">Tappy</tspan><tspan fill="#F5821F">AI</tspan>
  </text>

  <!-- Tagline -->
  <text x="200" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#999" letter-spacing="2">
    CHẠM ĐẾN MỌI DỊCH VỤ
  </text>

  <!-- Icons row -->
  <g transform="translate(60, 278)" fill="#F5821F">
    <!-- Food plate -->
    <g transform="translate(0,0)">
      <ellipse cx="25" cy="22" rx="18" ry="4"/>
      <path d="M10 22 Q25 8 40 22" fill="none" stroke="#F5821F" stroke-width="2.5"/>
      <line x1="25" y1="8" x2="25" y2="4" stroke="#F5821F" stroke-width="2"/>
      <text x="25" y="36" text-anchor="middle" font-size="8" font-family="Arial">Ăn Uống</text>
    </g>
    <!-- Shopping cart -->
    <g transform="translate(90,0)">
      <path d="M8 6 L12 6 L16 18 L32 18 L35 10 L14 10" fill="none" stroke="#F5821F" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="18" cy="22" r="2.5"/>
      <circle cx="30" cy="22" r="2.5"/>
      <text x="22" y="36" text-anchor="middle" font-size="8" font-family="Arial">Mua Sắm</text>
    </g>
    <!-- Globe with plane -->
    <g transform="translate(180,0)">
      <circle cx="22" cy="14" r="12" fill="none" stroke="#F5821F" stroke-width="2.5"/>
      <ellipse cx="22" cy="14" rx="6" ry="12" fill="none" stroke="#F5821F" stroke-width="1.5"/>
      <line x1="10" y1="14" x2="34" y2="14" stroke="#F5821F" stroke-width="1.5"/>
      <text x="22" y="36" text-anchor="middle" font-size="8" font-family="Arial">Du Lịch</text>
    </g>
    <!-- Film/Music -->
    <g transform="translate(270,0)">
      <rect x="8" y="6" width="22" height="16" rx="2" fill="none" stroke="#F5821F" stroke-width="2.5"/>
      <line x1="13" y1="6" x2="13" y2="22" stroke="#F5821F" stroke-width="1.5"/>
      <line x1="25" y1="6" x2="25" y2="22" stroke="#F5821F" stroke-width="1.5"/>
      <text x="19" y="36" text-anchor="middle" font-size="8" font-family="Arial">Giải Trí</text>
    </g>
  </g>
</svg>
