[plugins]
android-application = { id = "com.android.application", version.ref = "agp" }
android-library = { id = "com.android.library", version.ref = "agp" }
kotlin-android = { id = "org.jetbrains.kotlin.android", version.ref = "kotlin" }
kotlin-jvm = { id = "org.jetbrains.kotlin.jvm", version.ref = "kotlin" }
kotlin-serialization = { id = "org.jetbrains.kotlin.plugin.serialization", version.ref = "kotlin" }
# Real build error found during Phase 1B.1 first local build (gradlew assembleDebug):
# "Starting in Kotlin 2.0, the Compose Compiler Gradle plugin is required when compose is
# enabled." The compiler moved out of the Kotlin Gradle plugin into this separate plugin,
# versioned in lockstep with `kotlin` itself — the old `composeOptions.kotlinCompilerExtensionVersion`
# approach (Groovy/Kotlin-1.9-era) no longer applies.
kotlin-compose = { id = "org.jetbrains.kotlin.plugin.compose", version.ref = "kotlin" }
ksp = { id = "com.google.devtools.ksp", version.ref = "ksp" }
hilt = { id = "com.google.dagger.hilt.android", version.ref = "hilt" }
# Phase 0.5: pinned only, not applied in any build.gradle.kts yet — no :benchmark or
# :baselineprofile module exists. Apply once a Phase 2+ screen is worth benchmarking.
androidx-baselineprofile = { id = "androidx.baselineprofile", version.ref = "baselineProfile" }
